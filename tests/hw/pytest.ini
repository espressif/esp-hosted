[pytest]
testpaths =
    eh_test_feat_boot
    eh_test_feat_wifi
    eh_test_feat_bt
    eh_test_feat_rpc
    eh_test_feat_system
    eh_test_feat_nw_split

markers =
    boot: Boot and handshake tests
    wifi: WiFi feature tests
    bt: Bluetooth feature tests
    gpio: GPIO expander tests
    mem_monitor: Memory monitor tests
    peer_data: Peer data transfer tests
    system: System feature tests (OTA, heartbeat, FW version)
    host_ps: Host power save tests
    nw_split: Network split tests
    nw_split_ps: Network split + host power save tests
    light_sleep: CP light sleep tests

log_cli = true
log_cli_level = INFO
