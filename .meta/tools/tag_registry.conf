# ESP-Hosted Tag Registry
# Source of truth for tag code → directory/file name mapping.
#
# Format:  code = name
# Rules:
#   - All codes lowercase, globally unique across this entire file
#   - Minimum 2 characters; extend on collision (co → cop → copr ...)
#   - Directory codes and file codes share the same uniqueness pool
#   - Section codes are NOT registered here — local to each file, unique per file
#
# Tag format (in HTML comments):
#   <!-- %% dirs.dirs-file.section.o %% - always|context|ignore -->
#   <!-- %% dirs.dirs-file.section.c %% -->
#
#   - dir codes joined by '.'
#   - '-' separates last dir from file code
#   - section follows file code with '.'
#   - .o = open tag, .c = close tag (always last component)
#   - loading preference only on opening tags, after ' - '
#
# Examples:
#   .meta/specs/coprocessor/verified/rpc_dispatch.md  → sp.co.ve-rd
#   .meta/specs/AGENT_CONTEXT.md                      → sp-ac
#   .meta/specs/system/verified/scope.md              → sp.sy.ve-sc
#   .meta/brainstorm/20260328_spec_system.md           → me.br-260328ss
#   fg/cp/src/esp_hosted_cp_core.c                    → fg.cp.src-cor

